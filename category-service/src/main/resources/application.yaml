server:
  port: 8087

spring:
  application:
    name: category-service
  data:
    mongodb:
      uri: mongodb://ecommerce:ecommerce123@mongodb:27017/categorydb?authSource=admin
    redis:
      host: redis
      port: 6379
  cache:
    type: redis
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true