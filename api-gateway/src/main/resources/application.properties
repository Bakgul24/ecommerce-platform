server.port=8080
spring.application.name=api-gateway

# USER SERVICE
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://user-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# PRODUCT SERVICE
spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=http://product-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**

# ORDER SERVICE
spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=http://order-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

# PAYMENT SERVICE
spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=http://payment-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/payments/**

# INVENTORY SERVICE
spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].uri=http://inventory-service:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/inventory/**

# =========================
# EUREKA
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true