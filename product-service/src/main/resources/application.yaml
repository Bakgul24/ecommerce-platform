server:
  port: 8082

spring:
  application:
    name: product-service

  data:
    mongodb:
      uri: mongodb://ecommerce:ecommerce123@localhost:27017/productdb?authSource=admin
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true