services:

  postgres:
    image: postgres:15
    container_name: ecommerce-postgres
    restart: always
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce123
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ecommerce
      MONGO_INITDB_ROOT_PASSWORD: ecommerce123
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ecommerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ecommerce-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - ecommerce-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - ecommerce-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - eureka-server
    ports:
      - "8080:8080"
    networks:
      - ecommerce-network

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - eureka-server
      - postgres
    ports:
      - "8081:8081"
    networks:
      - ecommerce-network

  product-service:
    build: ./product-service
    container_name: product-service
    depends_on:
      - eureka-server
      - mongodb
      - redis
    ports:
      - "8082:8082"
    networks:
      - ecommerce-network

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - eureka-server
      - kafka
      - postgres
    ports:
      - "8083:8083"
    networks:
      - ecommerce-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      - eureka-server
      - kafka
      - postgres
    ports:
      - "8084:8084"
    networks:
      - ecommerce-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - eureka-server
      - kafka
      - mongodb
    ports:
      - "8085:8085"
    networks:
      - ecommerce-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - eureka-server
      - kafka
    ports:
      - "8086:8086"
    networks:
      - ecommerce-network

  category-service:
    build: ./category-service
    container_name: category-service
    depends_on:
      - eureka-server
      - mongodb
      - redis
    ports:
      - "8087:8087"
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data: